<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Account – Sugar Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --brown-dark: #2C1810; --brown-mid: #5C3317; --brown-warm: #8B4513;
            --caramel: #C68642; --cream: #FDF6EC; --cream-dark: #F5E6D0;
            --gold: #D4A843; --white: #FFFEF9; --text-dark: #1A0F08; --text-muted: #7A5C45;
            --error: #C0392B; --success: #27AE60;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }
        .card {
            background: var(--white); border-radius: 24px;
            box-shadow: 0 24px 80px rgba(44,24,16,.12);
            width: 100%; max-width: 640px; padding: 52px 56px;
            animation: fadeSlideUp .6s ease both;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-header {
            text-align: center; margin-bottom: 40px;
        }
        .card-header .logo { font-size: 48px; display: block; margin-bottom: 12px;
            animation: bounceIn .8s ease both .2s; }
        @keyframes bounceIn {
            0%  { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); }
            100%{ transform: scale(1); opacity: 1; }
        }
        .card-header h1 {
            font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--brown-dark);
        }
        .card-header p { color: var(--text-muted); font-size: .9rem; margin-top: 6px; }

        .alert {
            padding: 12px 16px; border-radius: 10px; font-size: .875rem;
            margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
        }
        .alert-error   { background: #FEE; border-left: 4px solid var(--error); color: var(--error); }
        .alert-success { background: #EFD; border-left: 4px solid var(--success); color: var(--success); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-full  { grid-column: 1 / -1; }

        .form-group { display: flex; flex-direction: column; gap: 7px;
            animation: fadeSlideUp .5s ease both; }
        .form-group:nth-child(1){ animation-delay: .05s; }
        .form-group:nth-child(2){ animation-delay: .10s; }
        .form-group:nth-child(3){ animation-delay: .15s; }
        .form-group:nth-child(4){ animation-delay: .20s; }
        .form-group:nth-child(5){ animation-delay: .25s; }

        label { font-size: .78rem; font-weight: 500; color: var(--text-dark);
            letter-spacing: .5px; text-transform: uppercase; }

        .input-wrap { position: relative; }
        .input-wrap .icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            font-size: 15px; color: var(--caramel); pointer-events: none; }

        input[type=text], input[type=email], input[type=password], input[type=tel] {
            width: 100%; padding: 12px 12px 12px 40px;
            border: 1.5px solid #E8D8C4; border-radius: 11px;
            font-family: inherit; font-size: .88rem; color: var(--text-dark);
            background: var(--cream); transition: all .2s; outline: none;
        }
        input:focus {
            border-color: var(--caramel); background: var(--white);
            box-shadow: 0 0 0 4px rgba(196,134,66,.12);
        }

        .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px;
            background: #E8D8C4; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: all .3s; }

        .btn-primary {
            width: 100%; padding: 15px; margin-top: 28px;
            background: linear-gradient(135deg, var(--brown-warm), var(--brown-mid));
            color: var(--cream); border: none; border-radius: 12px;
            font-family: inherit; font-size: 1rem; font-weight: 500;
            cursor: pointer; letter-spacing: .5px; transition: all .25s; position: relative; overflow: hidden;
        }
        .btn-primary::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, var(--caramel), var(--brown-warm)); opacity: 0; transition: opacity .25s;
        }
        .btn-primary:hover::after { opacity: 1; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(92,51,23,.35); }
        .btn-primary span { position: relative; z-index: 1; }

        .login-link { text-align: center; margin-top: 24px; font-size: .875rem; color: var(--text-muted); }
        .login-link a { color: var(--brown-warm); font-weight: 600; text-decoration: none; }
        .login-link a:hover { color: var(--caramel); }

        .terms { font-size: .78rem; color: var(--text-muted); text-align: center; margin-top: 14px; }
        .terms a { color: var(--brown-warm); }

        @media (max-width: 600px) {
            .card { padding: 36px 24px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <span class="logo">🍫</span>
        <h1>Create Your Account</h1>
        <p>Join Sugar Corner and start ordering today!</p>
    </div>

    <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>
    <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>

    <form method="POST" action="/register" id="regForm">
        <div class="form-grid">

            <div class="form-group">
                <label for="firstName">First Name</label>
                <div class="input-wrap">
                    <span class="icon">👤</span>
                    <input type="text" id="firstName" name="firstName" placeholder="Kasun" required/>
                </div>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <div class="input-wrap">
                    <span class="icon">👤</span>
                    <input type="text" id="lastName" name="lastName" placeholder="Perera" required/>
                </div>
            </div>

            <div class="form-group form-full">
                <label for="email">Email Address</label>
                <div class="input-wrap">
                    <span class="icon">✉️</span>
                    <input type="email" id="email" name="email" placeholder="kasun@example.com" required/>
                </div>
            </div>

            <div class="form-group form-full">
                <label for="phone">Phone Number <small style="text-transform:none;font-weight:300;">(optional)</small></label>
                <div class="input-wrap">
                    <span class="icon">📱</span>
                    <input type="tel" id="phone" name="phone" placeholder="0771234567"/>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <span class="icon">🔑</span>
                    <input type="password" id="password" name="password" placeholder="Min 6 chars" required oninput="checkStrength(this.value)"/>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrap">
                    <span class="icon">🔑</span>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required oninput="checkMatch()"/>
                </div>
                <small id="matchMsg" style="font-size:.78rem;"></small>
            </div>

        </div><!-- /form-grid -->

        <button type="submit" class="btn-primary"><span>Create Account →</span></button>
    </form>

    <div class="login-link">Already have an account? <a href="/login">Sign in</a></div>
    <div class="terms">By registering you agree to our <a href="#">Terms of Service</a>.</div>
</div>

<script>
    function checkStrength(val) {
        const fill = document.getElementById('strengthFill');
        let strength = 0;
        if (val.length >= 6)  strength++;
        if (val.length >= 10) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9!@#$%]/.test(val)) strength++;
        const colors = ['','#e74c3c','#e67e22','#f1c40f','#27ae60'];
        const widths  = ['0%','30%','55%','75%','100%'];
        fill.style.width      = widths[strength];
        fill.style.background = colors[strength];
    }
    function checkMatch() {
        const p  = document.getElementById('password').value;
        const c  = document.getElementById('confirmPassword').value;
        const msg = document.getElementById('matchMsg');
        if (!c) { msg.textContent = ''; return; }
        if (p === c) { msg.style.color = '#27ae60'; msg.textContent = '✓ Passwords match'; }
        else         { msg.style.color = '#e74c3c'; msg.textContent = '✗ Passwords do not match'; }
    }
</script>
</body>
</html>
