<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password – Sugar Corner</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --brown-dark: #2C1810; --brown-mid: #5C3317; --brown-warm: #8B4513;
            --caramel: #C68642; --cream: #FDF6EC; --white: #FFFEF9;
            --text-dark: #1A0F08; --text-muted: #7A5C45;
            --error: #C0392B; --success: #27AE60;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; font-family: 'DM Sans', sans-serif;
            background: var(--cream); display: flex; align-items: center; justify-content: center; padding: 40px 20px;
        }
        .card {
            background: var(--white); border-radius: 24px;
            box-shadow: 0 24px 80px rgba(44,24,16,.12);
            width: 100%; max-width: 440px; padding: 52px 48px;
            text-align: center;
            animation: fadeUp .6s ease both;
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .icon-wrap {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, var(--brown-warm), var(--caramel));
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; margin: 0 auto 24px;
            animation: bounceIn .8s ease both .2s;
        }
        @keyframes bounceIn { 0%{transform:scale(0);opacity:0;} 60%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }

        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--brown-dark); margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: .875rem; margin-bottom: 32px; line-height: 1.5; }

        .alert { padding: 12px 16px; border-radius: 10px; font-size: .875rem; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px; text-align: left; }
        .alert-error   { background: #FEE; border-left: 4px solid var(--error); color: var(--error); }

        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: .78rem; font-weight: 500; color: var(--text-dark);
            letter-spacing: .5px; text-transform: uppercase; margin-bottom: 7px; }
        .input-wrap { position: relative; }
        .input-wrap .icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            font-size: 15px; color: var(--caramel); }
        input[type=email], input[type=password] {
            width: 100%; padding: 12px 12px 12px 40px;
            border: 1.5px solid #E8D8C4; border-radius: 11px;
            font-family: inherit; font-size: .9rem; color: var(--text-dark);
            background: var(--cream); outline: none; transition: all .2s;
        }
        input:focus { border-color: var(--caramel); background: var(--white); box-shadow: 0 0 0 4px rgba(196,134,66,.12); }

        .btn-primary {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--brown-warm), var(--brown-mid));
            color: var(--cream); border: none; border-radius: 12px;
            font-family: inherit; font-size: .95rem; font-weight: 500; cursor: pointer;
            transition: all .25s; margin-top: 8px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(92,51,23,.35); }
        .back-link { display: block; margin-top: 22px; font-size: .875rem; color: var(--text-muted); }
        .back-link a { color: var(--brown-warm); font-weight: 600; text-decoration: none; }
        .back-link a:hover { color: var(--caramel); }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap">🔒</div>
    <h1>Reset Password</h1>
    <p class="subtitle">Enter your email and choose a new password. Make sure you remember it this time! 😊</p>

    <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>

    <form method="POST" action="/reset-password">
        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
                <span class="icon">✉️</span>
                <input type="email" id="email" name="email" placeholder="your@email.com" required/>
            </div>
        </div>
        <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="input-wrap">
                <span class="icon">🔑</span>
                <input type="password" id="newPassword" name="newPassword" placeholder="Min 6 characters" required/>
            </div>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <div class="input-wrap">
                <span class="icon">🔑</span>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat new password" required/>
            </div>
        </div>
        <button type="submit" class="btn-primary">Reset Password →</button>
    </form>
    <div class="back-link">Remembered it? <a href="/login">Back to Login</a></div>
</div>
</body>
</html>
