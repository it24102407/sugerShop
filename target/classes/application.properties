# ?? Server ??????????????????????????????????????????????????
server.port=8080

# ?? DataSource ??????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/sugarcorner_db_dev3.0?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=ms12122004#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? Connection Pool (HikariCP) ???????????????????????????????
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ?? Thymeleaf ????????????????????????????????????????????????
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ?? Multipart (profile photo upload) ?????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ?? Logging ??????????????????????????????????????????????????
logging.level.com.brownieshop=DEBUG
logging.level.org.springframework.security=WARN

# ?? Session ??????????????????????????????????????????????????
server.servlet.session.timeout=30m